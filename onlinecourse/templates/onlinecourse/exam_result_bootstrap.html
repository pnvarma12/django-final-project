<!DOCTYPE html>
<html lang="en">
<head>
    <title>Exam Result</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <div class="card">
            <div class="card-body text-center">
                {% if passed %}
                    <h1 class="text-success">Congratulations!</h1>
                    <h3>You passed the exam for {{ course.name }}</h3>
                {% else %}
                    <h1 class="text-danger">Try Again</h1>
                    <h3>You did not reach the 70% passing grade.</h3>
                {% endif %}
                <p class="lead">Your Score: {{ score }} / {{ total_possible }}</p>
                <a href="{% url 'onlinecourse:course_details' course.id %}" class="btn btn-secondary">Back to Course</a>
            </div>
        </div>
    </div>
</body>
</html>
