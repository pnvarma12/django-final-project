<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ course.name }}</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <div class="jumbotron">
            <h1 class="display-4">{{ course.name }}</h1>
            <p class="lead">{{ course.description }}</p>
        </div>

        <h3>Lessons</h3>
        <div class="card-columns">
            {% for lesson in course.lesson_set.all %}
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">Lesson {{ forloop.counter }}: {{ lesson.title }}</h5>
                    <p class="card-text">{{ lesson.content }}</p>
                </div>
            </div>
            {% endfor %}
        </div>

        <div class="mt-4">
            <a class="btn btn-primary btn-lg" href="{% url 'onlinecourse:submit' course.id %}">Take the Exam</a>
        </div>
    </div>
</body>
</html>
